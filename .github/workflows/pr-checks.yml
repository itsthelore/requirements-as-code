name: PR Checks

# Pre-merge tier (v0.7.14, ADR-027 rule 1): pull requests run the static
# quality gates plus a small smoke battery — core, golden, and dogfood on one
# Python version. The full battery × version grid stays merge-gated on main
# (ci.yml); this tier exists to catch lint/type breakage, output-contract
# drift, and corpus damage before merge, in about two minutes.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: ruff check
        run: python -m ruff check src/ tests/

      - name: ruff format --check
        run: python -m ruff format --check src/ tests/

      - name: mypy
        run: python -m mypy src/

  smoke:
    name: smoke (core + golden + dogfood, py3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run smoke battery
        run: >
          python -m pytest -q
          tests/test_validate.py tests/test_parser.py tests/test_schema.py
          tests/test_identity.py tests/test_frontmatter.py
          tests/test_metadata_identity.py tests/test_idgen.py
          tests/test_ci_batteries.py tests/test_corpus.py
          tests/test_operations.py
          tests/test_golden.py tests/test_dogfood.py

  # Watchkeeper dogfood: every pull request gets a product-knowledge review by
  # running the CLI directly from a source install. The composite action wrapper
  # now lives in rac-ci (itsthelore/rac-ci/watchkeeper/github); rac-core dogfoods
  # the engine itself rather than its own published wrapper.
  watchkeeper:
    name: watchkeeper (dogfood, source install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run watchkeeper
        env:
          PR_BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --quiet --no-tags origin \
            "+refs/heads/$PR_BASE_REF:refs/remotes/origin/$PR_BASE_REF" || true
          rac watchkeeper rac --base "origin/$PR_BASE_REF" --format github \
            --fail-on error > "$GITHUB_STEP_SUMMARY"

  # Validate dogfood (Registrar): run `rac validate --sarif` from a source install
  # and upload to Code Scanning (skipped on forks, whose token cannot be granted
  # security-events: write). The wrapper action now lives in
  # itsthelore/rac-ci/registrar/github; this dogfoods the engine directly.
  validate:
    name: validate (dogfood, source install)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run rac validate (SARIF)
        id: validate
        run: |
          set +e
          rac validate rac --sarif > rac.sarif
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF
        if: ${{ always() && !github.event.pull_request.head.repo.fork }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rac.sarif

      - name: Re-surface exit code
        env:
          EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::rac validate exited $EXIT_CODE — see Code Scanning annotations."
            exit "$EXIT_CODE"
          fi

  # Agent-rules drift gate (v0.21.16, ADR-067): every pull request re-derives the
  # live-decision digest from the corpus and fails if any committed agent-context
  # file (CLAUDE.md, AGENTS.md, .cursor/rules, .github/copilot-instructions.md) is
  # stale or missing its managed block. `--check` never writes; this is the
  # Success Measure "a stale rules file fails CI", so the generated projection
  # cannot silently rot relative to rac/. Source install, like the other dogfood
  # jobs.
  agent-rules:
    name: agent-rules (drift check, source install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check agent-rules freshness
        run: rac export rac/ --agent-rules --check

  # Grounding-eval gate (v0.23.0, WS1, ADR-066): every pull request re-scores the
  # retrieval tools against the committed fixture corpus and query set and fails
  # if any gated metric regresses past its floor or baseline tolerance, or a
  # hard-negative (e.g. a superseded decision) surfaces. `--check` never writes
  # the baseline; re-baselining is human-only via `rac eval --update-baseline`,
  # so CI can never silently move the bar. Source install, like the other gates.
  eval:
    name: grounding-eval (gate, source install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run the grounding-eval gate
        run: rac eval --check

  # Doctor dogfood (v0.23.0, WS3): every pull request runs `rac doctor` on the
  # RAC corpus. It exits non-zero only on a validation or relationship-integrity
  # error (orphan/hub/injection findings are advisory warnings and exit 0), so it
  # gates the same errors the validate/relationships jobs do, in one health pass.
  doctor:
    name: doctor (dogfood, source install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run the doctor health diagnostic
        run: rac doctor rac/

  # PR-gate dogfood: run the full contract as a single `rac gate --sarif` from a
  # source install — validation, relationships, and review under the corpus
  # enforcement policy — uploading one SARIF under the Code Scanning category
  # `rac-gate` (distinct from the standalone validate job, so the analyses never
  # collide). The wrapper action now lives in itsthelore/rac-ci/gatekeeper/github.
  # Skipped on forks, whose token cannot be granted security-events: write.
  gate:
    name: pr-gate (dogfood, source install)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run rac gate (SARIF)
        id: gate
        run: |
          set +e
          mkdir -p rac-sarif
          rac gate rac --sarif > rac-sarif/gate.sarif
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload gate SARIF
        if: ${{ always() && !github.event.pull_request.head.repo.fork }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rac-sarif/gate.sarif
          category: rac-gate

      - name: Re-surface exit code
        env:
          EXIT_CODE: ${{ steps.gate.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::RAC PR gate failed (exit $EXIT_CODE) — see Code Scanning annotations."
            exit "$EXIT_CODE"
          fi

