name: Extension Release

# Build, test, package, and — only on a `vscode-v*` release tag — publish the
# VS Code / Cursor extension to the Marketplace and OpenVSX. Publishing is the
# last step and is reached only after the full v0.21.9 test gate is green
# (viewer + extension integration tests). A manual `workflow_dispatch` run does
# everything except publish (a dry run that uploads the .vsix as an artifact).
#
# Required repository secrets for publishing: VSCE_PAT (Marketplace) and
# OVSX_PAT (OpenVSX). Without them the publish steps fail; the build/test/package
# steps need neither.
on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: build · test · package · publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The tests and the extension both shell out to a real `rac`.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install rac
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      # ---- gate: the v0.21.9 test harness must pass before we package ----
      - name: Viewer tests (lore-web)
        working-directory: lore-web
        run: |
          npm ci
          npm test

      - name: SDK — build
        working-directory: typescript/rac-sdk
        run: |
          npm ci
          npm run build

      - name: Extension — typecheck and bundle
        working-directory: typescript/rac-vscode
        run: |
          npm ci
          npm run check-types
          npm run compile

      - name: Extension — integration tests
        working-directory: typescript/rac-vscode
        env:
          RAC_BIN: rac
        run: xvfb-run -a npm test

      # ---- package ----
      - name: Package vsix
        working-directory: typescript/rac-vscode
        run: npx @vscode/vsce package -o rac-vscode.vsix

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v6
        with:
          name: rac-vscode-vsix
          path: typescript/rac-vscode/rac-vscode.vsix
          retention-days: 14

      # ---- publish (release tags only, after everything above is green) ----
      - name: Publish to the VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        working-directory: typescript/rac-vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath rac-vscode.vsix --pat "$VSCE_PAT"

      - name: Publish to OpenVSX
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        working-directory: typescript/rac-vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish rac-vscode.vsix --pat "$OVSX_PAT"
