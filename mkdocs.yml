site_name: Lore
site_description: >-
  Give your coding agent the decisions your team already made — typed
  Markdown artifacts in your repo, served over MCP.
site_url: https://tcballard.github.io/requirements-as-code/
repo_url: https://github.com/tcballard/requirements-as-code
repo_name: tcballard/requirements-as-code

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - MCP Server: mcp.md
  - CLI Reference: cli.md
  - Artifacts: artifacts.md
  - Relationships: relationships.md
  - Repository Workflow: repo-workflow.md
  - Examples: examples.md
  - Ecosystem: ecosystem.md
  - Testing & Contributing: testing.md
